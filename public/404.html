<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ElanDrive Labs</title>
  <!-- GitHub Pages SPA redirect: sends all 404s back to index.html -->
  <script>
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = window.location.origin + '/?p=' +
      encodeURIComponent(path + search + hash);
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
